# Target fly.toml for the Postgres HA topology. DO NOT deploy this until the
# data has been migrated into Postgres (see docs/postgres.md, steps 1-6).
# At cutover step 7:  cp fly.postgres.toml fly.toml && fly deploy
#
# Differences from the SQLite config: no [[mounts]] volume, no DB_PATH, a
# [processes] split (web x2 for HA + a single ingester), and min 2 web machines.

app = 'tree-appreciation'
primary_region = 'ams'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'
  # DATABASE_URL is set via `fly mpg attach`, not here.

[processes]
  web = "node dist/index.js"
  ingester = "node dist/ingester-runner.js"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 2
  processes = ["web"]

[[vm]]
  memory = '2gb'
  cpus = 2
  memory_mb = 2048
